<div id="app"></div>
<script src="../../dist/vue.global.js"></script>
<script>
  const { createApp, h, ref, watch, nextTick } = Vue

  const Child = {
    props: ['n'],
    setup(props) {
      watch(
        () => props.n,
        () => console.log('child pre watch', props.n)
      )

      watch(
        () => props.n,
        () => console.log('child post watch', props.n),
        { flush: 'post' }
      )

      return () => h('p', `child: ${props.n}`)
    },
  }

  const App = {
    setup() {
      const count = ref({a:0})

      watch(count.value.a, () => console.log('parent pre watch', count.value.a))
      watch(
        count.value.a,
        () => console.log('parent post watch', count.value.a),
        { flush: 'post' }
      )
      watch(
        count.value.a,
        () => console.log('parent sync watch', count.value.a),
        { flush: 'sync' }
      )

      window.bump = () => {
        count.value.a++
        count.value.a++
        count.value.a++
      }

      window.bumpAndTick = async () => {
        count.value.a++
        console.log('after set')
        await nextTick()
        console.log('after nextTick')
      }

      return () =>
        h('div', [
          h(
            'button',
            {
              onClick() {
                count.value.a++
                count.value.a++
              },
            },
            `count: ${count.value.a}`
          ),
          h(Child, { n: count.value.a }),
        ])
    },
  }

  createApp(App).mount('#app')
</script>
